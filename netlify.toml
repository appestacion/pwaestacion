[build]
  command = "npm install --include=dev && cd netlify/functions && npm install && cd ../.. && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# FIX: CRITICAL — Impedir que el navegador y el CDN de Netlify cacheen index.html.
# Sin esta cabecera, el navegador puede servir un index.html CACHADO que referencia
# archivos JS con hashes ANTIGUOS que ya no existen en el deploy actual.
# Esto produce el error: "Failed to load module script: Expected a JavaScript
# module script but the server responded with a MIME type of text/html"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # FIX: force=false (por defecto) asegura que Netlify sirve archivos estaticos
  # primero antes de aplicar el redirect. Solo las rutas que NO coinciden con un
  # archivo en dist/ seran redirigidas a index.html (routing SPA).

# FIX M4: Content Security Policy — Permite los recursos que la app necesita.
# - blob: → manifest dinámico (pwaIdentity.js), imágenes blob
# - unsafe-inline → scripts y estilos inline en index.html (loader, spinner)
# - fonts.googleapis.com / fonts.gstatic.com → Google Fonts (Inter)
# - firestore.googleapis.com → Firestore SDK
# - firebaseinstallations.googleapis.com → Firebase Installations
# - identitytoolkit.googleapis.com → Firebase Auth (signIn)
# - securetoken.googleapis.com → Firebase Auth (token refresh)
# - apis.google.com → Google Identity Services
# - firebasestorage.googleapis.com → Firebase Storage (imágenes subidas)
# FIX M5: Se agregó fonts.googleapis.com y fonts.gstatic.com a connect-src
# porque Workbox intercepta las peticiones de fuentes via FetchEvent (fetch API),
# y fetch() está gobernado por connect-src, NO por style-src/font-src.
# Sin esto, el SW lanza "violates Content Security Policy" en cada carga de fuente.
# FIX M6: Tesseract.js OCR ahora usa archivos locales (public/tesseract/)
# en vez de CDN, así NO necesita cdn.jsdelivr.net en script-src.
# - 'wasm-unsafe-eval' → permite WebAssembly.instantiate() para el core WASM
# - tessdata.projectnaptha.com en connect-src → datos de idioma vía fetch()
# FIX M7: Se agregó blob: a script-src para que el worker personalizado
# (ocr-worker.js) pueda usar importScripts() con Blob URLs generados
# internamente al cargar los archivos .wasm.js del core de Tesseract.
# TODO futuro: migrar 'unsafe-inline' a nonces para script-src
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; manifest-src blob: 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://firestore.googleapis.com https://firebaseinstallations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://apis.google.com https://firebasestorage.googleapis.com https://tessdata.projectnaptha.com; worker-src 'self' blob:; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    # FIX: Tambien impedir cache del service worker en el CDN de Netlify.
    # Si el SW se cachea en el CDN, el navegador nunca ve la nueva version.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# FIX M6: Archivos locales de Tesseract.js OCR (worker + core WASM).
# Son estáticos y grandes (~8MB total), se cachean agresivamente.
[[headers]]
  for = "/tesseract/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# FIX M7: Forzar Content-Type correcto para archivos .wasm.js de Tesseract.
# La doble extensión .wasm.js causa que algunos servidores/proxies sirvan
# estos archivos con MIME type incorrecto (application/wasm u
# application/octet-stream). Como tenemos X-Content-Type-Options: nosniff
# global, el navegador RECHAZA importScripts() si el Content-Type no es
# application/javascript. Este bloque DEBE ir DESPUÉS del /tesseract/*
# general para que Netlify aplique esta regla más específica (la última
# regla que coincide tiene prioridad).
[[headers]]
  for = "/tesseract/*.wasm.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# FIX: Tambien impedir cache del manifest para que los cambios de identidad PWA
# se reflejen inmediatamente al recargar.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# FIX: Impedir cache del archivo workbox-precaching para que el SW siempre
# tenga la lista correcta de archivos a cachear.
[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  functionsTimeout = 30