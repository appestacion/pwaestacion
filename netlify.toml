[build]
  command = "npm install --include=dev && cd netlify/functions && npm install && cd ../.. && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# FIX: CRITICAL — Impedir que el navegador y el CDN de Netlify cacheen index.html.
# Sin esta cabecera, el navegador puede servir un index.html CACHADO que referencia
# archivos JS con hashes ANTIGUOS que ya no existen en el deploy actual.
# Esto produce el error: "Failed to load module script: Expected a JavaScript
# module script but the server responded with a MIME type of text/html"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # FIX: force=false (por defecto) asegura que Netlify sirve archivos estaticos
  # primero antes de aplicar el redirect. Solo las rutas que NO coinciden con un
  # archivo en dist/ seran redirigidas a index.html (routing SPA).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    # FIX: Tambien impedir el cache del service worker en el CDN de Netlify.
    # Si el SW se cachea en el CDN, el navegador nunca ve la nueva version.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# FIX: Tambien impedir cache del manifest para que los cambios de identidad PWA
# se reflejen inmediatamente al recargar.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# FIX: Impedir cache del archivo workbox-precaching para que el SW siempre
# tenga la lista correcta de archivos a cachear.
[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  functionsTimeout = 30
